<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanovic AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #1e293b;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 15px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .info h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .info p {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .user-message {
            background-color: #2563eb;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background-color: #1e293b;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #334155;
        }

        footer {
            background-color: #1e293b;
            padding: 15px 20px;
            border-top: 1px solid #334155;
        }

        .input-group {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <header>
        <div class="avatar">S</div>
        <div class="info">
            <h1>Sanovic AI</h1>
            <p>Profesyonel Analiz ve Muhakeme Asistanı</p>
        </div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            Merhaba, ben Sanovic. İstek adresimiz güncellendi. Test etmeye hazırız.
        </div>
    </div>

    <footer>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Sanovic'e bir şeyler yazın..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </footer>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');

        let messageHistory = [];

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';

            messageHistory.push({ role: 'user', content: text });

            try {
                // İstek adresi jarvis-omega-eosin projesindeki chat2'ye bağlandı
                const response = await fetch('https://jarvis-omega-eosin.vercel.app/api/chat2', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ messages: messageHistory })
                });

                const data = await response.json();
                
                if (data.reply) {
                    appendMessage(data.reply, 'ai-message');
                    messageHistory.push({ role: 'assistant', content: data.reply });
                } else if (data.error) {
                    console.error('API Hatası:', data.error);
                    appendMessage('Sanovic şu anda yanıt veremiyor (API Hatası).', 'ai-message');
                } else {
                    appendMessage('Sistemden geçersiz bir yanıt döndü.', 'ai-message');
                }

            } catch (error) {
                console.error('Bağlantı Hatası:', error);
                appendMessage('Vercel sunucusuna bağlanılamadı. CORS ayarlarına dikkat edin.', 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
