<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis | AI Control Center</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; background: #161b22; border-bottom: 1px solid #30363d; text-align: center; color: #58a6ff; font-weight: bold; }
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { align-self: flex-end; background: #1f6feb; color: white; }
        .jarvis { align-self: flex-start; background: #21262d; border: 1px solid #30363d; }
        .input-area { padding: 20px; background: #161b22; display: flex; gap: 10px; }
        #user-input { flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 8px; border: none; background: #238636; color: white; }
    </style>
</head>
<body>
<header>JARVIS AI CONTROL CENTER</header>
<div id="chat-box"></div>
<div class="input-area">
    <input type="text" id="user-input" placeholder="Aklınızda ne var?">
    <button onclick="handleSend()">GÖNDER</button>
</div>
<script>
    const chatBox = document.getElementById('chat-box'), userInput = document.getElementById('user-input');
    
    // KESİN ADRESLER - ASLA DEĞİŞMEYECEK
    const API_URL = "https://jarvis-omega-eosin.vercel.app/api/chat";
    const IMG_API_URL = "https://jarvis-kappa-silk.vercel.app/api/generate";
    const EDIT_API_URL = "https://jarvis-kappa-silk.vercel.app/api/edit";
    const MUSIC_API_URL = "https://jarvis-kappa-silk.vercel.app/api/music";
    const TTS_API_URL = "https://jarvis-kappa-silk.vercel.app/api/tts";

    function addMessage(role, text) {
        const div = document.createElement('div'); div.className = `msg ${role}`;
        div.textContent = text;
        chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handleSend() {
        const val = userInput.value.trim(); if (!val) return;
        addMessage('user', val); userInput.value = '';
        try {
            const res = await fetch(API_URL, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ messages: [{ role: "user", content: val }], model: "llama-3.3" }) 
            });
            const data = await res.json();
            addMessage('jarvis', data.choices[0].message.content);
        } catch (e) { addMessage('jarvis', "Bağlantı hatası: " + e.message); }
    }
</script>
</body>
</html>
